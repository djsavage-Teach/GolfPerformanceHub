<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bees Golf Training - Performance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bee-purple: #7000cc;
            --bee-dark: #0f0f0f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }

        .heading-font { font-family: 'Syncopate', sans-serif; }

        .bee-gradient {
            background: linear-gradient(135deg, #4c008a 0%, #000000 100%);
        }

        .card-header-gradient {
            background: linear-gradient(135deg, #4c008a 0%, #000000 100%);
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(112, 0, 204, 0.1);
        }

        .active-tab {
            border-bottom: 4px solid #7000cc;
            color: #7000cc;
            background-color: rgba(112, 0, 204, 0.03);
        }

        .login-bg {
            background: radial-gradient(circle at center, #1e0036 0%, #000000 100%);
        }

        .btn-primary {
            background-color: #7000cc;
            color: white;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #5900a3;
            transform: scale(1.02);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .ranking-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 2rem;
            overflow: hidden;
        }

        .stat-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 2rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        @media (max-width: 480px) {
            .header-text { font-size: 10.5vw !important; }
            .header-logo { height: 12vw !important; }
        }

        .mobile-tab-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: none;
        }
        
        @media (min-width: 768px) {
            .mobile-tab-grid {
                display: flex;
                border-bottom: 1px solid #e2e8f0;
            }
        }
    </style>
</head>
<body>

    <!-- AUTHENTICATION OVERLAY -->
    <div id="auth-screen" class="fixed inset-0 z-[200] flex items-center justify-center login-bg hidden">
        <div class="relative bg-white w-full max-w-md mx-4 rounded-[2.5rem] shadow-2xl overflow-hidden">
            <button onclick="hideAuth()" class="absolute top-6 right-6 text-white/50 hover:text-white z-10">
                <i class="fa-solid fa-circle-xmark text-2xl"></i>
            </button>
            <div class="bee-gradient p-10 text-white text-center">
                <div class="w-20 h-20 bg-white rounded-2xl mx-auto mb-4 flex items-center justify-center border border-white/20 p-2 shadow-xl overflow-hidden">
                    <img src="https://cmsv2-assets.apptegy.net/uploads/7672/logo/9154/bee_new.png" alt="Bees Logo" class="w-full h-full object-contain">
                </div>
                <h2 id="auth-title" class="text-lg font-bold heading-font tracking-tighter uppercase">Clubhouse Login</h2>
            </div>
            
            <div class="p-8">
                <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-4">
                    <div id="name-field" class="hidden">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Full Name</label>
                        <input type="text" id="auth-name" placeholder="First Last" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition font-medium">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Email Address</label>
                        <input type="email" required id="auth-email" placeholder="email@domain.com" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition font-medium">
                    </div>
                    <div id="auth-error" class="hidden text-red-500 text-[10px] font-bold uppercase tracking-tight text-center bg-red-50 p-3 rounded-xl border border-red-100 italic">
                        Email not found. Check spelling or register.
                    </div>
                    <button type="submit" id="auth-submit-btn" class="w-full btn-primary font-black uppercase tracking-[0.2em] py-5 rounded-2xl shadow-xl mt-4 text-xs flex items-center justify-center gap-3">
                        <span id="auth-btn-text">Sign In</span>
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                    <p id="auth-toggle-text" class="text-[10px] text-slate-500 font-bold mb-2 uppercase">Don't have an account?</p>
                    <button id="auth-toggle-btn" onclick="toggleAuthMode()" class="text-purple-700 font-black text-xs uppercase tracking-widest hover:underline">
                        Register
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP UI -->
    <div id="main-app" class="min-h-screen flex flex-col">
        <nav class="bg-black text-white sticky top-0 z-50 border-b border-purple-900/30">
            <div class="max-w-7xl mx-auto px-6">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-4 cursor-pointer" onclick="showSection('drills')">
                        <img src="https://cmsv2-assets.apptegy.net/uploads/7672/logo/9154/bee_new.png" alt="Bees Logo" class="h-8 w-auto">
                    </div>
                    <div id="nav-auth-container" class="flex items-center gap-4">
                        <button onclick="showAuth()" class="bg-purple-700 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-purple-600 transition">
                            Login
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <header class="bee-gradient text-white py-12 md:py-16 px-4 relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')]"></div>
            <div class="max-w-7xl mx-auto relative z-10 text-center">
                <div id="welcome-message" class="mb-4 hidden">
                    <span class="text-purple-400 font-black uppercase tracking-[0.3em] text-[10px]">Welcome Back, <span id="user-display-name">Athlete</span></span>
                </div>
                <div class="flex items-center justify-center gap-2 md:gap-12 whitespace-nowrap">
                    <span class="header-text text-[10vw] md:text-8xl font-black heading-font tracking-tighter italic uppercase">BEES</span>
                    <div class="bg-white p-2 md:p-4 rounded-xl md:rounded-[2rem] shadow-2xl transform hover:scale-110 transition duration-500 flex-shrink-0">
                        <img src="https://cmsv2-assets.apptegy.net/uploads/7672/logo/9154/bee_new.png" alt="Bees Logo" class="header-logo h-10 md:h-28 w-auto drop-shadow-md">
                    </div>
                    <span class="header-text text-[10vw] md:text-8xl font-black heading-font tracking-tighter italic uppercase">GOLF</span>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-6 md:py-10 w-full flex-grow">
            <!-- TABS -->
            <div class="mobile-tab-grid mb-10 border border-slate-200 md:border-none rounded-3xl overflow-hidden md:rounded-none">
                <button onclick="showSection('drills')" id="tab-drills" class="px-4 md:px-8 py-5 font-black text-[10px] uppercase tracking-widest active-tab border-r md:border-r-0 border-b border-slate-200 md:border-b-0 whitespace-nowrap flex items-center justify-center gap-2">
                    <i class="fa-solid fa-flag-checkered text-[12px] md:hidden"></i> Drills
                </button>
                <button onclick="showSection('play')" id="tab-play" class="px-4 md:px-8 py-5 font-black text-[10px] uppercase tracking-widest text-slate-400 border-b border-slate-200 md:border-b-0 whitespace-nowrap flex items-center justify-center gap-2">
                    <i class="fa-solid fa-golf-ball-tee text-[12px] md:hidden"></i> Let's Play
                </button>
                <button onclick="showSection('leaderboard')" id="tab-leaderboard" class="px-4 md:px-8 py-5 font-black text-[10px] uppercase tracking-widest text-slate-400 border-r md:border-r-0 whitespace-nowrap flex items-center justify-center gap-2">
                    <i class="fa-solid fa-trophy text-[12px] md:hidden"></i> Rankings
                </button>
                <button onclick="showSection('profile')" id="tab-profile" class="px-4 md:px-8 py-5 font-black text-[10px] uppercase tracking-widest text-slate-400 whitespace-nowrap flex items-center justify-center gap-2">
                    <i class="fa-solid fa-user-gear text-[12px] md:hidden"></i> My Stats
                </button>
            </div>

            <!-- DRILLS SECTION -->
            <section id="section-drills" class="space-y-10">
                <h2 class="text-3xl font-black heading-font tracking-tighter italic uppercase text-slate-900">Training Exercises</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="drills-container"></div>
            </section>

            <!-- LET'S PLAY SECTION -->
            <section id="section-play" class="hidden space-y-10">
                <h2 class="text-3xl font-black heading-font tracking-tighter italic uppercase text-slate-900">Course Rounds</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="play-container"></div>
            </section>

            <!-- RANKINGS SECTION -->
            <section id="section-leaderboard" class="hidden space-y-16">
                <!-- Global Filter -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b border-slate-200 pb-10">
                    <div>
                        <h2 class="text-4xl font-black heading-font tracking-tighter italic uppercase">Leaderboards</h2>
                        <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mt-2">Sort by competitive metric</p>
                    </div>
                    <div class="bg-slate-200 p-1 rounded-2xl flex overflow-x-auto no-scrollbar">
                        <button onclick="setRankingMode('best')" id="mode-best" class="px-4 md:px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest bg-black text-white transition whitespace-nowrap">Personal Best</button>
                        <button onclick="setRankingMode('avg')" id="mode-avg" class="px-4 md:px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest text-slate-500 hover:text-black transition whitespace-nowrap">Season Average</button>
                    </div>
                </div>

                <!-- DRILLS SUB-SECTION -->
                <div class="space-y-8">
                    <div class="flex items-center gap-4">
                        <div class="h-px bg-slate-200 flex-grow"></div>
                        <h3 class="text-xl font-black italic uppercase tracking-widest text-slate-400">Drills</h3>
                        <div class="h-px bg-slate-200 flex-grow"></div>
                    </div>
                    <div id="rankings-drills-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
                </div>

                <!-- PLAY SUB-SECTION -->
                <div class="space-y-8">
                    <div class="flex items-center gap-4">
                        <div class="h-px bg-slate-200 flex-grow"></div>
                        <h3 class="text-xl font-black italic uppercase tracking-widest text-slate-400">Let's Play</h3>
                        <div class="h-px bg-slate-200 flex-grow"></div>
                    </div>
                    <div id="rankings-play-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
                </div>
            </section>

            <!-- PROFILE SECTION -->
            <section id="section-profile" class="hidden space-y-12">
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <div id="profile-user-card" class="bg-white p-12 rounded-[3rem] border border-slate-200 text-center flex flex-col items-center"></div>
                    <div id="profile-stats-container" class="lg:col-span-3 space-y-10 opacity-30 pointer-events-none">
                        <div id="profile-actual-content" class="space-y-10">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="bg-black text-white p-10 rounded-[2.5rem] flex flex-col justify-between h-48">
                                    <span class="text-purple-500 text-[10px] font-black uppercase tracking-widest">Lifetime Sessions</span>
                                    <h4 class="text-6xl font-black heading-font italic" id="stat-sessions">0</h4>
                                </div>
                                <div class="bg-white p-10 rounded-[2.5rem] border border-slate-200 flex flex-col justify-between h-48 shadow-sm">
                                    <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest">All Drills Avg (To Par)</span>
                                    <h4 class="text-6xl font-black heading-font italic text-slate-900" id="stat-avg">E</h4>
                                </div>
                            </div>
                            <div id="personal-drills-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- LOG MODAL -->
    <div id="log-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[3rem] max-w-md w-full p-12 relative shadow-2xl overflow-y-auto max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-300 hover:text-black"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <h2 id="modal-title" class="text-2xl font-black heading-font italic mb-6 uppercase tracking-tighter leading-tight">Submit Score</h2>
            <form id="drill-form" onsubmit="handleLogForm(event)" class="space-y-6">
                <input type="hidden" id="current-par" value="36">
                <input type="hidden" id="current-drill-name" value="">
                <input type="hidden" id="current-sheet-name" value="">
                <div id="extra-fields" class="space-y-6"></div>
                <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 relative">
                    <div class="flex justify-between items-center mb-3">
                        <label id="label-score" class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Total Strokes</label>
                        <span id="modal-par-display" class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">PAR 36</span>
                    </div>
                    <input type="number" id="input-score" required placeholder="00" class="w-full bg-transparent border-none outline-none font-black text-5xl text-purple-700">
                </div>
                <button type="submit" id="submit-btn" class="w-full btn-primary font-black uppercase tracking-[0.2em] py-6 rounded-2xl shadow-xl text-xs flex items-center justify-center gap-3">
                    <span id="submit-btn-text">Submit Score</span>
                </button>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 bg-white text-black border border-purple-500 px-8 py-4 rounded-full shadow-2xl transition-all duration-500 opacity-0 -translate-y-10 pointer-events-none z-[300] flex items-center gap-4">
        <i class="fa-solid fa-circle-check text-purple-600"></i>
        <span class="font-black text-[10px] uppercase tracking-widest" id="toast-msg">Entry Saved</span>
    </div>

    <script>
        const BASE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxji4lQkqQLJBFyCWbanjl4Lc0OXaHoVDOobJsXwJ2mjPjR-8GcTXUpr2aWkNgnQ3l1og/exec"; 

        const DRILLS = [
            { id: 'ud', name: "Up and Down", sheetName: "Up and Down", par: 36, icon: "fa-arrows-up-to-line" },
            { id: 'bt', name: "Birdie Time", sheetName: "Birdie Time", par: 54, icon: "fa-feather" },
            { id: 'p2', name: "2 Putt Drill", sheetName: "2 Putt Drill", par: 36, icon: "fa-bullseye" },
            { id: 'lp', name: "Lag Putting", sheetName: "Lag Putting", par: 36, icon: "fa-flag" },
            { id: 'em', name: "Eagle Mountain", sheetName: "Rounds (Eagle Mountain)", par: 36, icon: "fa-mountain-sun", isRound: true, isPlay: true },
            { id: 'rc', name: "Region Courses", sheetName: "Rounds (Region Courses)", par: 36, icon: "fa-map-location-dot", isRound: true, isRegion: true, isPlay: true }
        ];

        const REGION_COURSES = ["Remuda", "The Barn", "Crane Field", "Riverside", "The Bluff", "Wolf Creek", "Sun Hills"];

        let currentUser = null;
        let masterData = {}; 
        let authMode = 'login';
        let rankingMode = 'best'; 
        let sideToggles = {}; 

        window.onload = () => {
            const saved = localStorage.getItem('bees_golf_user');
            if (saved) {
                currentUser = JSON.parse(saved);
                updateUI();
            }
            refreshData();
        };

        async function refreshData() {
            if (!BASE_SCRIPT_URL) return;
            try {
                const response = await fetch(BASE_SCRIPT_URL);
                const text = await response.text();
                // Check if response is actually JSON before parsing
                if (text.trim().startsWith('{') || text.trim().startsWith('[')) {
                    masterData = JSON.parse(text);
                    renderContent();
                    processRankings();
                    if (currentUser) updateStatsDisplay();
                } else {
                    console.warn("GAS returned HTML instead of JSON. This usually happens during redirects.");
                }
            } catch (err) { 
                console.error("Sync Error:", err); 
            }
        }

        function createCardHTML(drill) {
            const instructions = (masterData[drill.sheetName] && masterData[drill.sheetName][0] && masterData[drill.sheetName][0][0]) || "Loading instructions...";
            return `
                <div class="bg-white rounded-[2.5rem] border border-slate-200 overflow-hidden card-hover flex flex-col">
                    <div class="card-header-gradient h-36 px-8 flex items-center justify-center text-center relative overflow-hidden">
                        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')]"></div>
                        <h3 class="text-white text-2xl font-black italic heading-font tracking-tighter uppercase leading-tight relative z-10">${drill.name}</h3>
                        <div class="absolute bottom-4 right-6 text-white/30 text-[8px] font-black uppercase tracking-widest z-20 ${drill.isPlay ? 'hidden' : ''}">PAR ${drill.par}</div>
                    </div>
                    <div class="p-8 flex-grow flex flex-col">
                        <div class="mb-8 flex-grow"><p class="text-slate-600 text-xs leading-relaxed italic font-medium">${instructions}</p></div>
                        <button onclick="attemptLog('${drill.name}')" class="w-full py-4 bg-black text-white font-black rounded-2xl hover:bg-purple-700 transition uppercase text-[10px] tracking-widest">Submit Score</button>
                    </div>
                </div>
            `;
        }

        function renderContent() {
            document.getElementById('drills-container').innerHTML = DRILLS.filter(d => !d.isPlay).map(createCardHTML).join('');
            document.getElementById('play-container').innerHTML = DRILLS.filter(d => d.isPlay).map(createCardHTML).join('');
        }

        function setRankingMode(mode) {
            rankingMode = mode;
            ['best', 'avg'].forEach(m => {
                const el = document.getElementById('mode-'+m);
                el.className = (m === mode) ? 'px-4 md:px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest bg-black text-white transition whitespace-nowrap' : 'px-4 md:px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest text-slate-500 hover:text-black transition whitespace-nowrap';
            });
            processRankings();
        }

        function toggleSideRanking(cardId, side) {
            sideToggles[cardId] = side;
            processRankings();
        }

        function processRankings() {
            const drillGrid = document.getElementById('rankings-drills-grid');
            const playGrid = document.getElementById('rankings-play-grid');
            if (!masterData || Object.keys(masterData).length === 0) return;

            const regData = masterData['Registration'] || [];
            const emailMap = {};
            regData.forEach((row, i) => { if(i>0) emailMap[row[1]] = row[0]; });

            const drillRankings = DRILLS.filter(d => !d.isPlay);
            drillGrid.innerHTML = drillRankings.map(drill => renderRankingCard(drill, drill.id, emailMap)).join('');

            let playCardsHTML = "";
            const emDrill = DRILLS.find(d => d.id === 'em');
            playCardsHTML += renderRankingCard(emDrill, 'em', emailMap);

            const rcDrill = DRILLS.find(d => d.id === 'rc');
            const rcRows = masterData[rcDrill.sheetName] || [];
            
            REGION_COURSES.forEach(courseName => {
                const hasData = rcRows.some((row, idx) => idx > 0 && row[4] === courseName);
                if (hasData) {
                    playCardsHTML += renderRankingCard(rcDrill, `rc_${courseName}`, emailMap, courseName);
                }
            });

            playGrid.innerHTML = playCardsHTML;
        }

        function renderRankingCard(drill, cardId, emailMap, specificCourse = null) {
            const rows = masterData[drill.sheetName] || [];
            const activeSide = sideToggles[cardId] || "Front";
            const sessions = [];
            const userAggr = {};

            rows.forEach((row, idx) => {
                if (idx === 0) return;
                const email = row[0];
                const score = parseInt(row[1]);
                if (!email || isNaN(score)) return;
                if (specificCourse && row[4] !== specificCourse) return;
                const sideValue = (drill.id === 'em') ? row[2] : row[3];
                if (drill.isPlay && sideValue !== activeSide) return;

                const name = emailMap[email] || email.split('@')[0];
                const diff = score - drill.par;
                sessions.push({ name, score, diff });
                if (!userAggr[email]) userAggr[email] = { name, totalDiff: 0, count: 0 };
                userAggr[email].totalDiff += diff;
                userAggr[email].count++;
            });

            let top5 = [];
            if (rankingMode === 'best') top5 = sessions.sort((a, b) => a.diff - b.diff).slice(0, 5);
            else top5 = Object.values(userAggr).map(u => ({ name: u.name, val: (u.totalDiff / u.count).toFixed(1), count: u.count })).sort((a, b) => a.val - b.val).slice(0, 5);

            const displayName = specificCourse ? specificCourse : drill.name;

            return `
                <div class="ranking-card p-8">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-purple-900/30 flex items-center justify-center text-purple-500"><i class="fa-solid ${drill.icon}"></i></div>
                            <div>
                                <h4 class="text-white font-black italic uppercase text-lg tracking-tighter leading-none">${displayName}</h4>
                                <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">${rankingMode === 'best' ? 'Top Rounds' : 'Season Avg'}</span>
                            </div>
                        </div>
                        ${drill.isPlay ? `
                            <div class="bg-zinc-900 p-1 rounded-xl flex">
                                <button onclick="toggleSideRanking('${cardId}', 'Front')" class="px-3 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition ${activeSide === 'Front' ? 'bg-purple-700 text-white' : 'text-zinc-500 hover:text-white'}">Front</button>
                                <button onclick="toggleSideRanking('${cardId}', 'Back')" class="px-3 py-2 rounded-lg text-[8px] font-black uppercase tracking-widest transition ${activeSide === 'Back' ? 'bg-purple-700 text-white' : 'text-zinc-500 hover:text-white'}">Back</button>
                            </div>
                        ` : ''}
                    </div>
                    <div class="space-y-2">
                        ${top5.length > 0 ? top5.map((entry, i) => `
                            <div class="flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/5">
                                <div class="flex items-center gap-4">
                                    <span class="text-zinc-600 font-black italic text-xs w-4">${i+1}</span>
                                    <span class="text-white font-bold uppercase text-[10px] tracking-tight">${entry.name}</span>
                                </div>
                                <div class="text-right">
                                    <div class="font-black italic text-lg ${parseFloat(entry.diff || entry.val) <= 0 ? 'text-green-500' : 'text-red-500'}">
                                        ${rankingMode === 'best' ? (entry.diff > 0 ? '+'+entry.diff : (entry.diff === 0 ? 'E' : entry.diff)) : (entry.val > 0 ? '+'+entry.val : (parseFloat(entry.val) === 0 ? 'E' : entry.val))}
                                    </div>
                                    <div class="text-[8px] text-zinc-600 font-bold uppercase">${rankingMode === 'avg' ? entry.count + ' Rounds' : 'Score: ' + entry.score}</div>
                                </div>
                            </div>
                        `).join('') : '<div class="py-10 text-center text-zinc-700 font-bold text-[10px] uppercase italic tracking-widest">No Leader Data</div>'}
                    </div>
                </div>
            `;
        }

        function updateStatsDisplay() {
            if (!currentUser || !masterData) return;
            let totalCount = 0, totalDiff = 0;
            const drillCards = [];

            DRILLS.forEach(d => {
                const rows = masterData[d.sheetName] || [];
                const userSessions = rows.filter((r, i) => i > 0 && r[0] === currentUser.email).map(r => ({
                    score: parseInt(r[1]),
                    date: r[2] || 'N/A',
                    side: r[3] || null,
                    course: r[4] || null,
                    diff: parseInt(r[1]) - d.par
                }));
                if (userSessions.length > 0) {
                    const avg = userSessions.reduce((acc, curr) => acc + curr.diff, 0) / userSessions.length;
                    totalCount += userSessions.length;
                    totalDiff += userSessions.reduce((acc, curr) => acc + curr.diff, 0);
                    drillCards.push({ drill: d, sessions: userSessions, top5: [...userSessions].sort((a,b) => a.diff - b.diff).slice(0, 5), count: userSessions.length, avgDiff: avg.toFixed(1) });
                }
            });

            document.getElementById('stat-sessions').innerText = totalCount;
            const totalAvgValue = totalCount > 0 ? (totalDiff / totalCount).toFixed(1) : "E";
            document.getElementById('stat-avg').innerText = (totalAvgValue > 0) ? `+${totalAvgValue}` : totalAvgValue;
            document.getElementById('personal-drills-grid').innerHTML = drillCards.map((c, idx) => `
                <div class="stat-card p-8 shadow-sm">
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400"><i class="fa-solid ${c.drill.icon}"></i></div>
                            <div><h4 class="font-black italic uppercase text-lg tracking-tighter leading-none mb-1">${c.drill.name}</h4><span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${c.count} Sessions</span></div>
                        </div>
                        <div class="text-right"><div class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">Avg</div><div class="font-black italic text-xl ${parseFloat(c.avgDiff) <= 0 ? 'text-green-500' : 'text-red-500'}">${c.avgDiff > 0 ? '+'+c.avgDiff : (parseFloat(c.avgDiff) === 0 ? 'E' : c.avgDiff)}</div></div>
                    </div>
                    <div class="space-y-2">
                        ${c.top5.map((s, i) => `<div class="flex justify-between items-center p-3 rounded-xl bg-slate-50 border border-slate-100"><div class="flex items-center gap-3"><span class="text-[10px] font-black italic text-slate-300 w-3">${i+1}</span><span class="text-[9px] font-bold uppercase text-slate-500">${s.course || 'Drill'} ${s.side ? '('+s.side+')' : ''}</span></div><span class="font-black italic text-sm ${s.diff <= 0 ? 'text-green-600' : 'text-red-500'}">${s.diff > 0 ? '+'+s.diff : (s.diff === 0 ? 'E' : s.diff)}</span></div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showAuth() { document.getElementById('auth-screen').classList.remove('hidden'); }
        function hideAuth() { document.getElementById('auth-screen').classList.add('hidden'); }
        function toggleAuthMode() {
            authMode = (authMode === 'login' ? 'register' : 'login');
            document.getElementById('auth-title').innerText = authMode === 'register' ? "REGISTER ATHLETE" : "CLUBHOUSE LOGIN";
            document.getElementById('name-field').classList.toggle('hidden', authMode !== 'register');
            document.getElementById('auth-submit-btn').querySelector('span').innerText = authMode === 'register' ? "Register & Enter" : "Sign In";
            document.getElementById('auth-toggle-btn').innerText = authMode === 'register' ? "Login" : "Register";
            document.getElementById('auth-error').classList.add('hidden');
        }

        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('auth-submit-btn');
            const email = document.getElementById('auth-email').value.trim().toLowerCase();
            const authError = document.getElementById('auth-error');
            
            setLoading(btn, true);
            authError.classList.add('hidden');

            // Wait briefly if masterData isn't ready yet or refresh it
            if (!masterData || !masterData['Registration']) {
                await refreshData();
            }

            let name = "", userFound = false;
            if (masterData['Registration']) {
                const match = masterData['Registration'].find(row => row[1] && row[1].toLowerCase() === email);
                if (match) { 
                    userFound = true; 
                    name = match[0]; 
                }
            }

            if (authMode === 'login' && !userFound) { 
                setLoading(btn, false); 
                authError.classList.remove('hidden'); 
                return; 
            }

            if (authMode === 'register') {
                name = document.getElementById('auth-name').value.trim() || email.split('@')[0];
                try {
                    // Google Apps Script doesn't handle CORS POST easily, so we use no-cors or form submission
                    // For "no-cors", we can't read the response, which is fine for submission
                    await fetch(BASE_SCRIPT_URL, { 
                        method: 'POST', 
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ action: 'register', data: { name, email } }) 
                    });
                } catch (err) {
                    console.error("Registration Error", err);
                }
            }

            currentUser = { name, email };
            localStorage.setItem('bees_golf_user', JSON.stringify(currentUser));
            setLoading(btn, false); 
            hideAuth(); 
            updateUI(); 
            setTimeout(refreshData, 1000); // Small delay to let GAS process
        }

        function handleLogout() { currentUser = null; localStorage.removeItem('bees_golf_user'); updateUI(); }

        function updateUI() {
            const authContainer = document.getElementById('nav-auth-container');
            const profileCard = document.getElementById('profile-user-card');
            const profileStats = document.getElementById('profile-stats-container');
            const welcome = document.getElementById('welcome-message');
            const userDisp = document.getElementById('user-display-name');

            if (currentUser) {
                welcome.classList.remove('hidden');
                userDisp.innerText = currentUser.name.split(' ')[0];
                authContainer.innerHTML = `<button onclick="handleLogout()" class="border-2 border-purple-800 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-purple-800 transition">Logout</button>`;
                profileCard.innerHTML = `<div class="w-24 h-24 bg-white shadow-xl rounded-[2rem] flex items-center justify-center mb-6 p-4 border border-slate-100"><img src="https://cmsv2-assets.apptegy.net/uploads/7672/logo/9154/bee_new.png" class="w-full h-full object-contain"></div><h3 class="text-2xl font-black italic tracking-tighter uppercase mb-1">${currentUser.name}</h3><p class="text-slate-400 text-[10px] font-bold mb-10 uppercase">${currentUser.email}</p><button onclick="handleLogout()" class="w-full py-4 rounded-2xl border border-slate-200 text-slate-400 font-black uppercase text-[10px] tracking-widest hover:text-red-500 transition">Logout</button>`;
                profileStats.classList.remove('opacity-30', 'pointer-events-none');
            } else {
                welcome.classList.add('hidden');
                authContainer.innerHTML = `<button onclick="showAuth()" class="bg-purple-700 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-purple-600 transition">Login</button>`;
                profileCard.innerHTML = `<div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-6"><i class="fa-solid fa-user-lock text-4xl text-slate-200"></i></div><h3 class="text-xl font-black italic tracking-tighter uppercase mb-2">Stats Locked</h3><p class="text-slate-400 text-[10px] font-bold mb-8 italic uppercase">Login to view progress</p><button onclick="showAuth()" class="w-full py-5 rounded-2xl bg-black text-white font-black uppercase text-[10px] tracking-widest">Login</button>`;
                profileStats.classList.add('opacity-30', 'pointer-events-none');
            }
        }

        function attemptLog(drillName) {
            if (!currentUser) { showAuth(); return; }
            const drill = DRILLS.find(d => d.name === drillName);
            document.getElementById('modal-title').innerText = drill.name;
            document.getElementById('current-par').value = drill.par;
            document.getElementById('current-drill-name').value = drill.name;
            document.getElementById('current-sheet-name').value = drill.sheetName;
            document.getElementById('modal-par-display').className = drill.isPlay ? 'hidden' : 'bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest';
            document.getElementById('modal-par-display').innerText = `PAR ${drill.par}`;
            
            const extras = document.getElementById('extra-fields');
            extras.innerHTML = "";
            if (drill.isRegion) {
                extras.innerHTML += `<div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">Select Course</label><select id="course-select" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 outline-none font-bold uppercase text-xs appearance-none">${REGION_COURSES.map(c => `<option>${c}</option>`).join('')}</select></div>`;
            }
            if (drill.isRound) extras.innerHTML += `<div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">Current Side</label><div class="flex gap-3"><label class="flex-1"><input type="radio" name="side" value="Front" checked class="hidden peer"><div class="w-full text-center py-4 bg-slate-100 rounded-2xl font-black text-[10px] uppercase peer-checked:bg-black peer-checked:text-white cursor-pointer transition">Front 9</div></label><label class="flex-1"><input type="radio" name="side" value="Back" class="hidden peer"><div class="w-full text-center py-4 bg-slate-100 rounded-2xl font-black text-[10px] uppercase peer-checked:bg-black peer-checked:text-white cursor-pointer transition">Back 9</div></label></div></div>`;
            document.getElementById('log-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('log-modal').classList.add('hidden'); }

        async function handleLogForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const score = parseInt(document.getElementById('input-score').value);
            const payload = { 
                action: 'logScore', 
                sheetName: document.getElementById('current-sheet-name').value, 
                data: { 
                    email: currentUser.email, 
                    score: score, 
                    side: document.querySelector('input[name="side"]:checked')?.value || null, 
                    course: document.getElementById('course-select')?.value || null 
                } 
            };
            setLoading(btn, true);
            try {
                await fetch(BASE_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload) 
                });
            } catch (err) {
                console.error("Logging Error", err);
            }
            setLoading(btn, false); 
            closeModal(); 
            setTimeout(refreshData, 1000); 
            showToast("Score Saved");
        }

        function setLoading(btn, isLoading) {
            const text = btn.querySelector('span');
            if (isLoading) { btn.disabled = true; btn.dataset.oldText = text.innerHTML; text.innerHTML = '<div class="loading-spinner"></div>'; }
            else { btn.disabled = false; text.innerHTML = btn.dataset.oldText; }
        }

        function showSection(id) {
            ['drills', 'play', 'leaderboard', 'profile'].forEach(s => {
                document.getElementById('section-'+s).classList.add('hidden');
                document.getElementById('tab-'+s).classList.remove('active-tab');
                document.getElementById('tab-'+s).classList.add('text-slate-400');
            });
            document.getElementById('section-'+id).classList.remove('hidden');
            document.getElementById('tab-'+id).classList.add('active-tab');
            document.getElementById('tab-'+id).classList.remove('text-slate-400');
            if (masterData && Object.keys(masterData).length > 0) {
                if(id === 'leaderboard') processRankings();
                if(id === 'profile') updateStatsDisplay();
            }
            if (window.innerWidth < 768) window.scrollTo({ top: 350, behavior: 'smooth' });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('opacity-0', '-translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { toast.classList.add('opacity-0', '-translate-y-10'); toast.classList.remove('opacity-100', 'translate-y-0'); }, 3000);
        }
    </script>
</body>
